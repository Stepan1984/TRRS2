name: CI/CD Pipeline

on:
  push:
    branches: [ "trrs4" ]
  pull_request:
    branches: [ "trrs4" ]

permissions:
  contents: write

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake git libssl-dev zlib1g-dev libcurl4-openssl-dev

      - name: Build prometheus-cpp
        run: |
          git clone https://github.com/jupp0r/prometheus-cpp.git /tmp/prom
          cd /tmp/prom && git submodule update --init
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DENABLE_TESTING=OFF ..
          cmake --build . --parallel 4
          sudo cmake --install .

      - name: Build matrix7
        run: cd source && make

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrix7-binary
          path: source/matrix7

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake git libssl-dev zlib1g-dev libcurl4-openssl-dev

      - name: Build prometheus-cpp
        run: |
          git clone https://github.com/jupp0r/prometheus-cpp.git /tmp/prom
          cd /tmp/prom && git submodule update --init
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DENABLE_TESTING=OFF ..
          cmake --build . --parallel 4
          sudo cmake --install .

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: matrix7-binary
          path: source/

      - name: Make binary executable
        run: chmod +x source/matrix7

      - name: Run tests
        run: bash cicd/test.sh

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: matrix7-binary
          path: usr/bin/

      - name: Make binary executable
        run: chmod +x usr/bin/matrix7

      - name: Install dpkg-deb
        run: sudo apt-get update && sudo apt-get install -y dpkg

      - name: Build .deb package
        run: bash cicd/package.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: trrs2-deb-package
          path: trrs2.deb

  deploy:
    name: Deploy to Docker Hub + Kubernetes
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/checkout@v4

      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: trrs2-deb-package
          path: .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/matrix7:latest .

      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/matrix7:latest

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Update image in deployment
        run: |
          sed -i "s|image: .*matrix7.*|image: ${{ secrets.DOCKER_USERNAME }}/matrix7:latest|g" k8s/deployment.yaml

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/
